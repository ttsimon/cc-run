# GoReleaser 配置：打 tag 时一次产出全平台二进制 + Release + Scoop/Homebrew/winget manifest。
# 校验： goreleaser check
# 本地试跑（不发布）： goreleaser release --snapshot --clean
version: 2

project_name: ccr

before:
  hooks:
    - go mod tidy

builds:
  - id: ccr
    main: ./cmd/ccr
    binary: ccr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    # Windows 用 zip（Scoop/winget 友好）。
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: 新功能
      regexp: "^feat"
      order: 0
    - title: 修复
      regexp: "^fix"
      order: 1
    - title: 其他改动
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^security:"
      - "^refactor:"

release:
  github:
    owner: ttsimon
    name: cc-run
  footer: |
    ## 安装

    - **下载二进制**：下方选对应系统的压缩包，解压把 `ccr`（Windows 为 `ccr.exe`）放进 PATH
    - **go install**：`go install github.com/ttsimon/cc-run/cmd/ccr@latest`
    - **Scoop**：`scoop bucket add ttsimon https://github.com/ttsimon/scoop-bucket && scoop install ccr`
    - **Homebrew**：`brew install ttsimon/tap/ccr`

    用法见 [README](https://github.com/ttsimon/cc-run#readme)。

# --- Windows: Scoop（自有 bucket，即时生效，无审核） ---
scoops:
  - repository:
      owner: ttsimon
      name: scoop-bucket
      branch: main
      token: "{{ .Env.GORELEASER_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/ttsimon/cc-run"
    description: "用选定 provider 的环境变量启动 claude，可同时多开、各用不同后端"
    license: MIT

# --- macOS / Linux: Homebrew tap（Cask，适用于预编译二进制） ---
homebrew_casks:
  - repository:
      owner: ttsimon
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GORELEASER_TOKEN }}"
    homepage: "https://github.com/ttsimon/cc-run"
    description: "用选定 provider 的环境变量启动 claude，可同时多开、各用不同后端"
    # 未签名二进制：安装后去掉 macOS 隔离属性，避免 Gatekeeper 拦截。
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ccr"]
          end

# winget 暂未启用。如需上架（向 microsoft/winget-pkgs 提 PR，需 fork + 审核），
# 参见 https://goreleaser.com/customization/winget/ 并补一个 winget: 段。
